---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: common-du-performance
  namespace: ztp-policies
  annotations:
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/standards: Telco RAN DU RDS
    ran.openshift.io/ztp-deploy-wave: "4"
spec:
  disabled: false
  remediationAction: inform
  dependencies:
    - apiVersion: policy.open-cluster-management.io/v1
      kind: Policy
      name: common-du-sriov-config
      namespace: ztp-policies
      compliance: Compliant
    - apiVersion: policy.open-cluster-management.io/v1
      kind: Policy
      name: common-du-ptp-config
      namespace: ztp-policies
      compliance: Compliant
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: performance-profile
        spec:
          remediationAction: enforce
          severity: low
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: performance.openshift.io/v2
                kind: PerformanceProfile
                metadata:
                  name: openshift-node-performance-profile
                  annotations:
                    kubeletconfig.experimental: |
                      {"topologyManagerScope": "pod",
                       "systemReserved": {"memory": "3Gi"}
                      }
                    ran.openshift.io/reference-configuration: ran-du.redhat.com
                spec:
                  additionalKernelArgs:
                    - rcupdate.rcu_normal_after_boot=0
                    - efi=runtime
                    - vfio_pci.enable_sriov=1
                    - vfio_pci.disable_idle_d3=1
                    - module_blacklist=irdma
                  cpu:
                    isolated: "4-31,36-63"
                    reserved: "0-3,32-35"
                  globallyDisableIrqLoadBalancing: false
                  hugepages:
                    defaultHugepagesSize: 1G
                    pages:
                      - count: 4
                        size: 1G
                  machineConfigPoolSelector:
                    pools.operator.machineconfiguration.openshift.io/master: ""
                  nodeSelector:
                    node-role.kubernetes.io/master: ""
                  numa:
                    topologyPolicy: restricted
                  realTimeKernel:
                    enabled: true
                  workloadHints:
                    highPowerConsumption: false
                    perPodPowerManagement: false
                    realTime: true
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: tuned-performance-patch
        spec:
          remediationAction: enforce
          severity: low
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: tuned.openshift.io/v1
                kind: Tuned
                metadata:
                  name: performance-patch
                  namespace: openshift-cluster-node-tuning-operator
                spec:
                  profile:
                    - name: performance-patch
                      data: |
                        [main]
                        summary=Configuration changes profile inherited from performance created tuned
                        include=openshift-node-performance-openshift-node-performance-profile
                        [scheduler]
                        group.ice-ptp=0:f:10:*:ice-ptp.*
                        group.ice-gnss=0:f:10:*:ice-gnss.*
                        group.ice-dplls=0:f:10:*:ice-dplls.*
                        [service]
                        service.stalld=start,enable
                        service.chronyd=stop,disable
                  recommend:
                    - machineConfigLabels:
                        machineconfiguration.openshift.io/role: master
                      priority: 19
                      profile: performance-patch
